# environment.yaml — Reproduces the savanna_test environment used for the BRCA1 label-flip experiment.
#
# Usage:
#   conda env create -f environment.yaml
#   conda activate brca1_label_flip
#
# GPU requirement: CUDA >= 12.4 (H100-class recommended, A100 works)
# If your CUDA != 13.0, edit the torch --extra-index-url below to match.

name: brca1_label_flip

channels:
  - conda-forge
  - bioconda
  - pytorch
  - defaults

dependencies:
  # ---- system / build ----
  - python=3.10
  - pip
  - samtools                     # faidx for .fai index
  - gcc_linux-64                 # needed to compile flash-attn / causal-conv1d

  # ---- pip packages (exact versions from savanna_test environment) ----
  - pip:
    # -- PyTorch ecosystem (CUDA 13.0) --
    - --extra-index-url https://download.pytorch.org/whl/cu130
    - torch==2.11.0
    - torchvision==0.26.0
    - torchaudio==2.6.0
    - triton==3.6.0
    # -- Evo2 + core deps --
    - evo2==0.5.5
    - flash-attn==2.8.3
    - causal-conv1d==1.5.4
    - transformers==5.8.1
    - tokenizers==0.22.1
    - huggingface-hub==1.14.0
    - fsspec==2025.12.0
    - ftfy==6.3.1
    - sentencepiece==0.2.1
    - einops==0.8.1
    - safetensors==0.7.0
    - regex==2025.11.3
    - tiktoken==0.12.0
    # -- data I/O --
    - pysam==0.23.3
    - pandas==2.3.3
    - openpyxl==3.1.5
    - numpy==2.3.5
    - pyarrow==23.0.1
    # -- ML / statistics --
    - scikit-learn==1.8.0
    - scipy==1.16.3
    - joblib==1.5.3
    - threadpoolctl==3.6.0
    # -- plotting --
    - matplotlib==3.10.8
    - seaborn==0.13.2
    # -- utilities --
    - tqdm==4.67.1
    - PyYAML==6.0.3
    - packaging==25.0
    - click==8.3.1
    - typing-extensions==4.15.0
    - certifi==2025.11.12
    - requests==2.32.5
    - urllib3==2.6.1
    - charset-normalizer==3.4.4
    - idna==3.11
    - python-dateutil==2.9.0.post0
    - six==1.17.0
    - pillow==12.0.0
    - contourpy==1.3.3
    - cycler==0.12.1
    - fonttools==4.62.1
    - kiwisolver==1.5.0
    - pyparsing==3.3.2
    - pytz==2026.2
    - tzdata==2025.2
    - et-xmlfile==2.0.0
    - networkx==3.6.1
    - mpmath==1.3.0
    - sympy==1.14.0
