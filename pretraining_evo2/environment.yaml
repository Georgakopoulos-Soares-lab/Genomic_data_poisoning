# ============================================================================
# environment.yaml — conda environment for Evo 2 / Savanna pre-training poisoning
# ============================================================================
# Reproduces the `savanna` conda env used for all Evo 2 experiments.
# Captured from the working env (python 3.12.12 + pip).
#
#   conda env create -f environment.yaml
#   conda activate savanna
#   bash setup_savanna.sh        # then installs Savanna (editable) INTO this env
#
# IMPORTANT — hardware / build notes (this is a CUDA build):
#   * torch==2.6.0+cu124 pulls from the PyTorch CUDA-12.4 wheel index (added below).
#     A compatible NVIDIA GPU + driver is required to actually train/infer.
#   * flash-attn, transformer-engine, causal-conv1d and ring-flash-attn compile
#     CUDA extensions. If `conda env create` fails on them, install torch first,
#     then add them with build isolation disabled, e.g.:
#         pip install torch==2.6.0+cu124 --extra-index-url https://download.pytorch.org/whl/cu124
#         pip install flash-attn==2.6.3 causal-conv1d==1.5.3.post1 \
#             transformer-engine==2.10.0 ring-flash-attn==0.1.8 --no-build-isolation
#     You will need nvcc (CUDA toolkit) and a matching C++ compiler on PATH.
#   * Exact reproduction of the full training run requires a multi-GPU cluster;
#     this env is provided for completeness and for the (single-GPU) smoke test
#     and inference paths. See README.md / DATA.md.
# ============================================================================
name: savanna
channels:
  - conda-forge
dependencies:
  - python=3.12.12
  - pip=25.3
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu124
      - torch==2.6.0+cu124
      - torchaudio==2.6.0+cu124
      - torchvision==0.21.0+cu124
      - triton==3.2.0
      - deepspeed==0.18.3
      - flash-attn==2.6.3
      - causal-conv1d==1.5.3.post1
      - ring-flash-attn==0.1.8
      - transformer-engine==2.10.0
      - transformer-engine-cu12==2.10.0
      - transformer-engine-torch==2.10.0
      - numpy==2.3.5
      - scipy==1.16.3
      - einops==0.8.1
      - ml-dtypes==0.5.4
      - sentencepiece==0.2.1
      - tokenizers==0.22.1
      - ninja==1.13.0
      - pybind11==3.0.1
      - omegaconf==2.3.0
      - pydantic==2.8.2
      - pydantic-core==2.20.1
      - pyyaml==6.0.3
      - wandb==0.23.1
      - jsonlines==4.0.0
      - lm-dataformat==0.0.20
      - zstandard==0.25.0
      - ujson==5.11.0
      - ftfy==6.3.1
      - regex==2025.11.3
      - tqdm==4.67.1
      - psutil==7.1.3
      - py-cpuinfo==9.0.0
      - hjson==3.1.0
      - msgpack==1.1.2
      - lazy-import-plus==0.0.2
      - boto3==1.42.7
      - botocore==1.42.7
      - s3transfer==0.16.0
      - protobuf==6.33.2
      - onnx==1.20.0
      - onnxscript==0.5.6
      - sympy==1.13.1
      - networkx==3.6.1
      - opt-einsum==3.4.0
      # ---- dev / test tooling (used by the test suite) ----
      - pytest==9.0.2
      - pytest-cov==7.0.0
      - pytest-xdist==3.8.0
      - pytest-forked==1.6.0
      - coverage==7.13.0
      - pre-commit==4.5.0
      - ruff==0.14.8
